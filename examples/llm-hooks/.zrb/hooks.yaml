# YAML Hook Configuration Examples
# These demonstrate various hook patterns

# Example 1: Simple logging hook (PostToolUse)
- name: log-tool-usage
  description: Log all tool usage to console
  events:
    - PostToolUse
  type: command
  config:
    command: 'echo "[HOOK] Tool used: $CLAUDE_TOOL_NAME"'
    shell: true
  enabled: true
  priority: 0

# Example 2: Block specific commands (PreToolUse)
- name: block-rm-commands
  description: Block rm commands in Bash
  events:
    - PreToolUse
  type: command
  config:
    command: |
      if echo "$CLAUDE_TOOL_INPUT" | grep -q '"rm '; then
        echo '{"decision": "block", "reason": "rm commands are not allowed"}'
        exit 2
      fi
      exit 0
    shell: true
  matchers:
    - field: tool_name
      operator: equals
      value: Bash
  enabled: false

# Example 3: Notify on session end (SessionEnd is terminal — fires once)
- name: session-end-notification
  description: Send notification when chat session ends
  events:
    - SessionEnd
  type: command
  config:
    command: 'echo "zrb chat session ended"'
    shell: true
  enabled: false

# Example 4: Audit chat commands (PreCommand)
- name: audit-commands
  description: Log every chat command the user runs
  events:
    - PreCommand
  type: command
  config:
    command: 'echo "[CMD] $CLAUDE_COMMAND_NAME $CLAUDE_COMMAND_ARGS" >> /tmp/zrb-commands.log'
    shell: true
  enabled: true

# Example 5: Per-turn journaling via Stop (block-to-continue)
- name: journal-reminder
  description: Remind the model to journal at each turn end using block-to-continue
  events:
    - Stop
  type: command
  config:
    command: |
      cat <<'EOF'
      {"decision": "block", "reason": "Pause to consider if anything from this turn is worth documenting."}
      EOF
    shell: true
  enabled: false

# Example 6: PostToolUseFailure — Log errors
- name: log-tool-errors
  description: Log tool execution failures
  events:
    - PostToolUseFailure
  type: command
  config:
    command: 'echo "[ERROR] $CLAUDE_TOOL_NAME failed: $CLAUDE_ERROR" >&2'
    shell: true
  enabled: true

# Example 7: SessionStart — Log session start
- name: session-start-log
  description: Log when session starts
  events:
    - SessionStart
  type: command
  config:
    command: 'echo "[SESSION] Started at $(date)"'
    shell: true
  enabled: true

# Example 8: UserPromptSubmit — Log prompts
- name: log-prompt
  description: Log user prompts
  events:
    - UserPromptSubmit
  type: command
  config:
    command: 'echo "[PROMPT] logged"'
    shell: true
  enabled: true

# Example 9: PostCommand — Log command results
- name: post-command-log
  description: Log completed commands
  events:
    - PostCommand
  type: command
  config:
    command: 'echo "[CMD-DONE] $CLAUDE_COMMAND_NAME"'
    shell: true
  enabled: true

# Example 10: PermissionRequest — Auto-allow in dev
- name: auto-allow-dev
  description: Auto-allow permission requests in dev mode
  events:
    - PermissionRequest
  type: command
  config:
    command: |
      echo '{"hookSpecificOutput": {"decision": {"behavior": "allow"}}}'
    shell: true
  matchers:
    - field: tool_name
      operator: equals
      value: Bash
  enabled: false

# Example 11: Notification — Log notifications
- name: log-notifications
  description: Log LLM notifications
  events:
    - Notification
  type: command
  config:
    command: 'echo "[NOTIFY] notification received"'
    shell: true
  enabled: true

# Example 12: PreCompact — Log compaction events
- name: log-compaction
  description: Log when conversation compacts
  events:
    - PreCompact
  type: command
  config:
    command: 'echo "[COMPACT] Compacting conversation"'
    shell: true
  enabled: true

# Example 13: PreToolUse — Force the approval prompt (permissionDecision: ask).
# "ask" overrides a tool-policy/YOLO auto-approve; an explicit DENY still wins.
- name: ask-before-bash
  description: Force manual approval for Bash even if it would be auto-approved
  events:
    - PreToolUse
  type: command
  config:
    command: |
      echo '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "ask", "permissionDecisionReason": "Manual approval required for Bash"}}'
    shell: true
  matchers:
    - field: tool_name
      operator: equals
      value: Bash
  enabled: false

# Example 14: PreCompact — Block compaction (skip summarization this turn).
- name: block-compaction
  description: Preserve full history by blocking compaction
  events:
    - PreCompact
  type: command
  config:
    command: |
      echo '{"decision": "block", "reason": "Preserve full history"}'
      exit 2
    shell: true
  enabled: false

# Example 15: UserPromptSubmit — Halt the whole run with continue=false.
# Distinct from a block: continue=false stops ALL processing for the run.
- name: halt-on-stop-keyword
  description: Halt the run when the prompt is exactly "/stop"
  events:
    - UserPromptSubmit
  type: command
  config:
    command: |
      echo '{"continue": false, "stopReason": "Halted by /stop keyword"}'
    shell: true
  matchers:
    - field: prompt
      operator: equals
      value: /stop
  enabled: false

# Example 16: SessionEnd — matcher on the `source` field (zrb emits "other" today).
- name: session-end-on-other
  description: Run only when SessionEnd source matches
  events:
    - SessionEnd
  type: command
  config:
    command: 'echo "[Session End] source matched"'
    shell: true
  matchers:
    - field: source
      operator: equals
      value: other
  enabled: false
