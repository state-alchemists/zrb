name: "Test"
run-name: "Run tests for ${{ github.actor }}"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Span the supported range (pyproject: >=3.11,<3.15). 3.14 is excluded
        # here because some optional extras (e.g. voyageai) cap at python<3.14.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Install ripgrep
        # file_search and the journal tool prefer `rg`; one test exercises the
        # ripgrep path directly and needs the binary present.
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Build README.pypi.md
        # README.pypi.md is the readme Poetry packages (it is gitignored), so it
        # must be generated before `poetry install` reads pyproject.
        run: python scripts/build_pypi_readme.py

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry install --all-extras --no-interaction

      - name: Lint and run tests with coverage
        # Single source of truth: the same script developers run locally.
        run: poetry run bash zrb-test.sh
