<style>
.modal {{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}}

.modal.show {{
    display: flex;
}}

.chat-container {{
    display: flex;
    height: calc(100vh - 60px);
    margin: 0;
    padding: 0;
}}

.sidebar {{
    width: 280px;
    background: var(--pico-secondary-background);
    border-right: 1px solid var(--pico-border-color);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}}

.sidebar-header {{
    padding: 1rem;
    border-bottom: 1px solid var(--pico-border-color);
}}

.sidebar-header h3 {{
    margin: 0 0 0.5rem 0;
    font-size: 0.9rem;
    color: var(--pico-muted-color);
}}

.new-chat-btn {{
    width: 100%;
    margin: 0;
}}

.session-list {{
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
}}

.session-item {{
    padding: 0.75rem;
    margin-bottom: 0.25rem;
    border-radius: var(--pico-border-radius);
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
}}

.session-item:hover {{
    background: var(--pico-card-background-color);
}}

.session-item.active {{
    background: var(--pico-primary-background);
    border-color: var(--pico-primary);
}}

.session-item .session-name {{
    font-weight: 500;
    margin-bottom: 0.25rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}}

.session-item .session-date {{
    font-size: 0.75rem;
    color: var(--pico-muted-color);
}}

.main-chat {{
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}}

.chat-header {{
    padding: 1rem;
    border-bottom: 1px solid var(--pico-border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
}}

.chat-header h2 {{
    margin: 0;
    font-size: 1.2rem;
}}

.messages-container {{
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
}}

.message {{
    margin-bottom: 1.5rem;
    animation: fadeIn 0.2s ease;
}}

@keyframes fadeIn {{
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}}

.message.user {{
    text-align: right;
}}

.message-content {{
    display: inline-block;
    max-width: 80%;
    padding: 0.75rem 1rem;
    border-radius: var(--pico-border-radius);
    line-height: 1.5;
}}

.message.assistant .message-content {{
    background: var(--pico-secondary-background);
    border: 1px solid var(--pico-border-color);
}}

.message.user .message-content {{
    background: var(--pico-primary-background);
    color: var(--pico-primary-inverse);
}}

.message pre {{
    margin: 0.5rem 0;
    padding: 0.5rem;
    background: var(--pico-card-background-color);
    border-radius: var(--pico-border-radius);
    overflow-x: auto;
    font-size: 0.85rem;
}}

.message code {{
    background: var(--pico-card-background-color);
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    font-size: 0.9em;
}}

.message pre code {{
    background: none;
    padding: 0;
}}

.input-container {{
    padding: 1rem;
    border-top: 1px solid var(--pico-border-color);
    background: var(--pico-background-color);
}}

.input-wrapper {{
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
}}

.message-input {{
    flex: 1;
    resize: none;
    min-height: 44px;
    max-height: 200px;
}}

.send-btn {{
    height: 44px;
    padding: 0 1.5rem;
}}

.typing-indicator {{
    display: flex;
    gap: 4px;
    padding: 0.75rem 1rem;
}}

.typing-indicator span {{
    width: 8px;
    height: 8px;
    background: var(--pico-muted-color);
    border-radius: 50%;
    animation: typing 1.4s infinite;
}}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {{
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
}}

.approval-panel {{
    background: var(--pico-card-background-color);
    border: 2px solid var(--pico-primary);
    border-radius: var(--pico-border-radius);
    padding: 1rem;
    margin: 1rem 0;
}}

.approval-panel h4 {{
    margin: 0 0 0.5rem 0;
    color: var(--pico-primary);
}}

.approval-panel .tool-name {{
    font-weight: 600;
    margin-bottom: 0.5rem;
}}

.approval-panel .tool-args {{
    background: var(--pico-background-color);
    padding: 0.5rem;
    border-radius: var(--pico-border-radius);
    margin: 0.5rem 0;
    font-family: monospace;
    font-size: 0.85rem;
    max-height: 200px;
    overflow-y: auto;
}}

.approval-panel .tool-args pre {{
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
}}

.approval-buttons {{
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
}}

.approval-buttons button {{
    flex: 1;
}}

.approval-buttons .btn-deny {{
    background: var(--pico-color);
    border-color: var(--pico-border-color);
}}

.approval-buttons .btn-edit {{
    background: var(--pico-secondary-background);
    border-color: var(--pico-secondary-border-color);
    color: var(--pico-color);
}}

.edit-panel {{
    margin-top: 1rem;
    padding: 1rem;
    background: var(--pico-background-color);
    border-radius: var(--pico-border-radius);
}}

.edit-panel textarea {{
    font-family: monospace;
    min-height: 150px;
}}

.edit-panel .edit-actions {{
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
}}

.connection-status {{
    font-size: 0.75rem;
    color: var(--pico-muted-color);
    display: flex;
    align-items: center;
    gap: 0.5rem;
}}

.status-dot {{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--pico-muted-color);
}}

.status-dot.connected {{
    background: #22c55e;
}}

.status-dot.disconnected {{
    background: #ef4444;
}}

.empty-state {{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--pico-muted-color);
    text-align: center;
    padding: 2rem;
}}

.empty-state h3 {{
    margin-bottom: 0.5rem;
}}
</style>

<div class="chat-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>Sessions</h3>
            <button class="new-chat-btn secondary" onclick="createNewSession()">
                + New Chat
            </button>
        </div>
        <div class="session-list" id="sessionList">
        </div>
    </aside>
    <main class="main-chat">
        <div class="chat-header">
            <h2 id="currentSessionName">New Chat</h2>
            <div class="connection-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state" id="emptyState">
                <h3>Start a conversation</h3>
                <p>Select a session or create a new one to begin chatting.</p>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    class="message-input"
                    placeholder="Type your message..."
                    rows="1"
                    onkeydown="handleInputKeydown(event)"
                ></textarea>
                <button class="send-btn primary" onclick="sendMessage()">
                    Send
                </button>
            </div>
        </div>
    </main>
</div>

<div id="approvalModal" class="modal">
    <article style="max-width: 600px;">
        <header>
            <strong>Tool Call Approval</strong>
        </header>
        <div id="approvalContent">
            <div class="tool-name" id="approvalToolName"></div>
            <div class="tool-args" id="approvalToolArgs">
                <pre></pre>
            </div>
        </div>
        <div class="approval-buttons" id="approvalButtons">
            <button class="primary" onclick="approveTool()">Approve</button>
            <button class="btn-edit" onclick="startEditTool()">Edit</button>
            <button class="btn-deny" onclick="denyTool()">Deny</button>
        </div>
        <div class="edit-panel" id="editPanel" style="display: none;">
            <label>
                Edit tool arguments (JSON):
                <textarea id="editArgsTextarea" class="message-input" rows="8"></textarea>
            </label>
            <div class="edit-actions">
                <button class="primary" onclick="submitEditTool()">Submit</button>
                <button class="secondary" onclick="cancelEditTool()">Cancel</button>
            </div>
        </div>
    </article>
</div>

<script>
const cfg = {
    apiBase: '/api/v1/chat',
    pageBase: '/chat',
};

let currentSessionId = null;
let eventSource = null;
let guestId = localStorage.getItem('chat_guest_id');
let sessions = [];

if (!guestId) {
    guestId = 'guest_' + Math.random().toString(36).substring(2, 10);
    localStorage.setItem('chat_guest_id', guestId);
}

function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
}

function handleInputKeydown(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
    }
    autoResize(event.target);
}

async function createNewSession() {
    try {
        const response = await fetch(`${cfg.apiBase}/sessions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ guest_id: guestId }),
        });
        const data = await response.json();
        await loadSessions();
        await selectSession(data.session_id);
    } catch (error) {
        console.error('Failed to create session:', error);
    }
}

async function loadSessions() {
    try {
        const response = await fetch(`${cfg.apiBase}/sessions?guest_id=${guestId}`);
        sessions = await response.json();
        renderSessionList();
    } catch (error) {
        console.error('Failed to load sessions:', error);
    }
}

function renderSessionList() {
    const list = document.getElementById('sessionList');
    if (sessions.length === 0) {
        list.innerHTML = '<p style="padding: 1rem; color: var(--pico-muted-color); font-size: 0.85rem;">No sessions yet</p>';
        return;
    }
    
    list.innerHTML = sessions.map(session => `
        <div class="session-item ${session.session_id === currentSessionId ? 'active' : ''}"
             onclick="selectSession('${session.session_id}')">
            <div class="session-name">${escapeHtml(session.conversation_name)}</div>
            <div class="session-date">${formatDate(session.updated_at)}</div>
        </div>
    `).join('');
}

function formatDate(isoString) {
    const date = new Date(isoString);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    return date.toLocaleDateString();
}

async function selectSession(sessionId) {
    if (currentSessionId === sessionId) return;
    
    disconnectSSE();
    currentSessionId = sessionId;
    
    const session = sessions.find(s => s.session_id === sessionId);
    document.getElementById('currentSessionName').textContent = 
        session ? session.conversation_name : 'Chat';
    
    renderSessionList();
    await loadHistory();
    connectSSE();
}

async function loadHistory() {
    const container = document.getElementById('messagesContainer');
    const emptyState = document.getElementById('emptyState');
    
    if (!currentSessionId) {
        container.innerHTML = '';
        container.appendChild(emptyState);
        emptyState.style.display = 'flex';
        return;
    }
    
    try {
        const response = await fetch(`${cfg.apiBase}/sessions/${currentSessionId}/history`);
        const history = await response.json();
        
        if (history.messages && history.messages.length > 0) {
            emptyState.style.display = 'none';
            container.innerHTML = history.messages.map(msg => 
                renderMessage(msg.role, msg.content)
            ).join('');
            scrollToBottom();
        } else {
            container.innerHTML = '';
            container.appendChild(emptyState);
            emptyState.style.display = 'flex';
        }
    } catch (error) {
        console.error('Failed to load history:', error);
    }
}

function renderMessage(role, content) {
    const formatted = formatMarkdown(content);
    return `
        <div class="message ${role}">
            <div class="message-content">${formatted}</div>
        </div>
    `;
}

function formatMarkdown(text) {
    if (!text) return '';
    
    let html = escapeHtml(text);
    
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code class="language-${lang}">${code.trim()}</code></pre>`;
    });
    
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    
    html = html.replace(/\n/g, '<br>');
    
    return html;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function connectSSE() {
    if (!currentSessionId) return;
    
    updateConnectionStatus('disconnected');
    
    eventSource = new EventSource(`${cfg.apiBase}/sessions/${currentSessionId}/stream`);
    
    eventSource.onopen = () => {
        updateConnectionStatus('connected');
    };
    
    eventSource.onmessage = async (event) => {
        try {
            const msg = JSON.parse(event.data);
            handleSSEMessage(msg);
        } catch (e) {
            console.error('Failed to parse SSE message:', e);
        }
    };
    
    eventSource.onerror = () => {
        updateConnectionStatus('disconnected');
        setTimeout(connectSSE, 3000);
    };
}

function updateConnectionStatus(status) {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    
    dot.className = 'status-dot ' + status;
    text.textContent = status === 'connected' ? 'Connected' : 'Disconnected';
}

function disconnectSSE() {
    if (eventSource) {
        eventSource.close();
        eventSource = null;
    }
}

function handleSSEMessage(msg) {
    const emptyState = document.getElementById('emptyState');
    
    switch (msg.type) {
        case 'status':
            if (msg.data.connected) {
                emptyState.style.display = 'none';
            }
            break;
            
        case 'message':
            appendMessage('assistant', msg.data);
            break;
            
        case 'approval':
            showApprovalModal(msg.data);
            break;
            
        case 'approval_resolved':
            hideApprovalModal();
            break;
            
        case 'error':
            appendMessage('assistant', `Error: ${msg.data}`);
            break;
    }
}

function appendMessage(role, content) {
    const container = document.getElementById('messagesContainer');
    const emptyState = document.getElementById('emptyState');
    
    emptyState.style.display = 'none';
    
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${role}`;
    messageDiv.innerHTML = `<div class="message-content">${formatMarkdown(content)}</div>`;
    container.appendChild(messageDiv);
    
    scrollToBottom();
}

function scrollToBottom() {
    const container = document.getElementById('messagesContainer');
    container.scrollTop = container.scrollHeight;
}

let currentApproval = null;

function showApprovalModal(approval) {
    currentApproval = approval;
    
    document.getElementById('approvalToolName').textContent = approval.tool_name;
    document.getElementById('approvalToolArgs').querySelector('pre').textContent = 
        JSON.stringify(approval.tool_args, null, 2);
    document.getElementById('editArgsTextarea').value = 
        JSON.stringify(approval.tool_args, null, 2);
    
    document.getElementById('approvalButtons').style.display = 'flex';
    document.getElementById('editPanel').style.display = 'none';
    document.getElementById('approvalModal').classList.add('show');
}

function hideApprovalModal() {
    currentApproval = null;
    document.getElementById('approvalModal').classList.remove('show');
}

async function approveTool() {
    if (!currentApproval || !currentSessionId) return;
    
    try {
        await fetch(`${cfg.apiBase}/sessions/${currentSessionId}/approve/${currentApproval.tool_call_id}`, {
            method: 'POST',
        });
        hideApprovalModal();
    } catch (error) {
        console.error('Failed to approve:', error);
    }
}

async function denyTool() {
    if (!currentApproval || !currentSessionId) return;
    
    try {
        await fetch(`${cfg.apiBase}/sessions/${currentSessionId}/deny/${currentApproval.tool_call_id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reason: 'Denied by user' }),
        });
        hideApprovalModal();
    } catch (error) {
        console.error('Failed to deny:', error);
    }
}

function startEditTool() {
    document.getElementById('approvalButtons').style.display = 'none';
    document.getElementById('editPanel').style.display = 'block';
}

function cancelEditTool() {
    document.getElementById('approvalButtons').style.display = 'flex';
    document.getElementById('editPanel').style.display = 'none';
}

async function submitEditTool() {
    if (!currentApproval || !currentSessionId) return;
    
    const argsText = document.getElementById('editArgsTextarea').value;
    
    try {
        const newArgs = JSON.parse(argsText);
        await fetch(`${cfg.apiBase}/sessions/${currentSessionId}/edit/${currentApproval.tool_call_id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newArgs),
        });
        hideApprovalModal();
    } catch (error) {
        alert('Invalid JSON format: ' + error.message);
    }
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    
    if (!message || !currentSessionId) return;
    
    input.value = '';
    autoResize(input);
    
    appendMessage('user', message);
    
    try {
        await fetch(`${cfg.apiBase}/sessions/${currentSessionId}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message }),
        });
    } catch (error) {
        console.error('Failed to send message:', error);
        appendMessage('assistant', 'Failed to send message. Please try again.');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadSessions();
    
    const input = document.getElementById('messageInput');
    autoResize(input);
});
</script>
